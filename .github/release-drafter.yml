name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Features"
    labels:
      - feature
      - enhancement
  - title: "Fixes"
    labels:
      - bug
      - fix
  - title: "Maintenance"
    labels:
      - chore
      - ci
change-template: "- $TITLE (#$NUMBER)"
template: |
  ## Changes
  $CHANGES
