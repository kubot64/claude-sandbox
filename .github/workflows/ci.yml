name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Job 1: shellcheck + bats 単体テスト（Docker 不要）
  # ----------------------------------------------------------------
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get install -y shellcheck bats

      - name: Run shellcheck + unit tests
        run: bash tests/run_all.sh --unit-only

  # ----------------------------------------------------------------
  # Job 2: Docker 統合テスト（PR 時 + main push 時に実行）
  # ----------------------------------------------------------------
  integration:
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get install -y shellcheck bats

      - name: Build Docker image
        run: docker build -t claude-sandbox .

      - name: Run integration tests
        # NET_ADMIN は GitHub Actions 標準ランナーで利用可能
        # ssh_tmpfs テストは --privileged を使用（ubuntu-latest ランナーで動作確認済み）
        run: bash tests/run_all.sh --integration
